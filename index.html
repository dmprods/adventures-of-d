<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Adventures of D</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Georgia',serif}
canvas{display:block}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#levelTitle{position:absolute;top:15%;right:30px;color:#fff;font-size:38px;font-family:'Fredoka One',cursive;text-shadow:0 2px 8px rgba(0,0,0,0.7),0 0 20px rgba(0,0,0,0.4);opacity:0;transition:opacity 0.8s;letter-spacing:3px;text-align:right;line-height:1.3}
#levelTitle.show{opacity:1}
#info{position:absolute;top:20px;right:30px;color:#fff;font-size:20px;text-shadow:0 2px 4px rgba(0,0,0,0.8);text-align:right;line-height:1.6}
#heartCount{position:absolute;bottom:20px;left:20px;color:#ff6688;font-size:22px;text-shadow:0 0 10px rgba(255,100,130,0.5);display:none}
#controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:13px;text-shadow:0 1px 2px rgba(0,0,0,0.8)}
#skipBtn{position:absolute;top:12px;left:16px;padding:4px 12px;font-size:10px;font-family:'Fredoka One',cursive;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.15);border-radius:12px;cursor:pointer;pointer-events:all;transition:all 0.3s;letter-spacing:0.5px;display:none;z-index:11}
#skipBtn:hover{background:rgba(255,255,255,0.25);color:#fff;border-color:rgba(255,255,255,0.4)}
#secretMsg{position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;z-index:25;background:rgba(0,0,0,0.92)}
#secretMsg .inner{text-align:center;animation:fadeUp 1.5s ease-out}
#secretMsg .inner .heart-big{font-size:80px;display:block;margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
#secretMsg .inner p{color:#f4e4c1;font-size:24px;line-height:2;text-shadow:0 0 20px rgba(255,200,100,0.5);max-width:500px}
#secretMsg .inner em{color:#ffaa88;font-style:italic}
#secretMsg .inner .close{color:rgba(255,255,255,0.3);font-size:14px;margin-top:30px;display:block}
#dialogueBox{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:90%;max-width:700px;background:linear-gradient(135deg,rgba(10,10,30,0.92),rgba(30,15,50,0.92));border:1px solid rgba(255,200,100,0.3);border-radius:16px;padding:20px 28px;z-index:12;display:none;pointer-events:none;box-shadow:0 0 40px rgba(0,0,0,0.5),0 0 15px rgba(255,200,100,0.1) inset}
#dialogueSpeaker{color:#e8c49a;font-size:14px;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
#dialogueText{color:#f0e6d6;font-size:19px;line-height:1.6;min-height:28px}
#dialogueHint{color:rgba(255,255,255,0.3);font-size:12px;text-align:right;margin-top:8px}
#titleScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;z-index:20;background:linear-gradient(180deg,rgba(10,10,30,0.3) 0%,rgba(20,15,40,0.5) 100%);padding:30px}
#titleScreen h1{position:absolute;top:30px;left:30px;font-size:36px;font-family:'Fredoka One',cursive;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.7),0 0 20px rgba(0,0,0,0.4);letter-spacing:3px;margin:0;text-align:left;line-height:1.2}
#startBtn{padding:14px 32px;font-size:18px;font-family:'Fredoka One',cursive;background:linear-gradient(135deg,#333 0%,#111 50%,#000 100%);color:#fff;border:none;border-radius:30px;cursor:pointer;pointer-events:all;transition:all 0.3s;letter-spacing:3px;text-shadow:0 1px 3px rgba(0,0,0,0.8);box-shadow:0 4px 15px rgba(0,0,0,0.5),0 0 10px rgba(0,0,0,0.3)}
#startBtn:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.6),0 0 20px rgba(50,50,50,0.4);background:linear-gradient(135deg,#444 0%,#222 50%,#111 100%)}
#endScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;z-index:20;overflow:hidden}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.15);opacity:0.7}}
@keyframes floatHeart{0%{transform:translateY(0) scale(1);opacity:0.8}50%{opacity:1}100%{transform:translateY(-120px) scale(0.3);opacity:0}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
.end-content{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;pointer-events:none;padding:30px 0}
.end-scene{position:absolute;top:0;left:0;width:100%;height:100%}
.end-scene canvas{width:100%!important;height:100%!important;display:block}
#endMsgTop,#endMsgBottom{color:#fff;font-family:'Fredoka One',cursive;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,0.7),0 0 20px rgba(0,0,0,0.4);letter-spacing:3px;pointer-events:auto;font-size:30px}
#endMsgTop{padding-top:20px}
#endMsgBottom{padding-bottom:30px}
.heart{position:absolute;font-size:20px;color:rgba(255,100,130,0.6);pointer-events:none;z-index:1}
#fade{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:15;pointer-events:none;opacity:0;transition:opacity 0.8s}
</style>
</head>
<body>
<div id="titleScreen">
  <h1>The Adventures of D</h1>
  <button id="startBtn" onclick="startGame()">START</button>
</div>
<div id="endScreen">
  <div class="end-scene"><canvas id="endCanvas"></canvas></div>
  <div class="end-content">
    <div id="endMsgTop"></div>
    <div style="flex:1"></div>
    <div id="endMsgBottom"></div>
  </div>
</div>
<div id="secretMsg" onclick="this.style.display='none';gameState='ENDING'">
  <div class="inner">
    <span class="heart-big">&hearts;</span>
    <p>You finished every level.<br>But my favourite adventure<br>is <em>life with you.</em></p>
    <span class="close">tap anywhere to close</span>
  </div>
</div>
<div id="hud">
  <div id="levelTitle"></div>
  <div id="info"></div>
  <div id="heartCount"></div>
  <div id="controls"></div>
  <button id="skipBtn" onclick="skipLevel()">Skip Level &raquo;</button>
</div>
<div id="dialogueBox">
  <div id="dialogueSpeaker"></div>
  <div id="dialogueText"></div>
  <div id="dialogueHint">ENTER to continue</div>
</div>
<div id="fade"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ================================================================
//  THE ADVENTURES OF D - 3D Browser Game
// ================================================================

let scene, camera, renderer, clock;
let gameState = 'TITLE';
let currentLevel = 0;
let levelData = {};
let character;
const keys = {};
const keysJustPressed = {};
let audioCtx, musicNodes = [], musicPlaying = false;

// Helper: mk can't set Three.js rotation/scale/position props in r128
function mk(obj, props) {
  for (const k in props) {
    if ((k === 'rotation' || k === 'position' || k === 'scale') && props[k]) obj[k].copy(props[k]);
    else obj[k] = props[k];
  }
  return obj;
}

// ---- HIDDEN HEARTS SYSTEM ----
let heartsCollected = [false, false, false, false, false]; // one per level

function createHiddenHeart(x, y, z) {
  const g = new THREE.Group();
  // Heart shape using spheres
  const hMat = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0xff1144, emissiveIntensity: 0.6, roughness: 0.3 });
  const s1 = new THREE.Mesh(new THREE.SphereGeometry(0.2, 10, 10), hMat);
  s1.position.set(-0.12, 0.1, 0); g.add(s1);
  const s2 = new THREE.Mesh(new THREE.SphereGeometry(0.2, 10, 10), hMat);
  s2.position.set(0.12, 0.1, 0); g.add(s2);
  const cone = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.3, 8), hMat);
  cone.position.y = -0.1; cone.rotation.z = Math.PI; g.add(cone);
  // Glow
  const glow = new THREE.PointLight(0xff3366, 0.5, 5);
  glow.position.y = 0.1; g.add(glow);
  g.position.set(x, y, z);
  g.userData.isHeart = true;
  g.traverse(c => { if (c.isMesh) c.castShadow = true; });
  scene.add(g);
  return g;
}

function updateHiddenHeart(heart, dt) {
  if (!heart || !heart.visible) return;
  heart.rotation.y += dt * 2;
  heart.position.y += Math.sin(Date.now() * 0.003) * 0.002;
}

function checkHeartCollect(heart, charPos, levelIdx) {
  if (!heart || !heart.visible || heartsCollected[levelIdx]) return false;
  if (charPos.distanceTo(heart.position) < 1.5) {
    heart.visible = false;
    heartsCollected[levelIdx] = true;
    const count = heartsCollected.filter(Boolean).length;
    const el = document.getElementById('heartCount');
    el.style.display = 'block';
    el.innerHTML = '\u2764\ufe0f'.repeat(count) + '\ud83e\udd0d'.repeat(5 - count);
    if (count === 5) {
      setTimeout(() => {
        document.getElementById('secretMsg').style.display = 'flex';
      }, 1000);
    }
    return true;
  }
  return false;
}

function updateHeartHud() {
  const count = heartsCollected.filter(Boolean).length;
  if (count > 0) {
    const el = document.getElementById('heartCount');
    el.style.display = 'block';
    el.innerHTML = '\u2764\ufe0f'.repeat(count) + '\ud83e\udd0d'.repeat(5 - count);
  }
}

// ---- DIALOGUE SYSTEM ----
let dialogueQueue = [], dialogueActive = false, dialogueTyping = false;
let dialogueFullText = '', dialogueCharIndex = 0, dialogueTimer = 0, dialogueCallback = null;

const DIALOGUES = {
  level1: [
    { speaker: 'M', text: "Ready for a friendly match, D? \u26bd" },
    { speaker: 'D', text: "Always ready. Let's go!" },
    { speaker: 'M', text: "Score 3 goals to win! And keep an eye out for hidden hearts \u2764\ufe0f" },
  ],
  level2: [
    { speaker: 'M', text: "Blistering barnacles! This looks like a Tintin adventure!" },
    { speaker: 'D', text: "Great snakes! Captain Haddock, is that you?" },
    { speaker: 'M', text: "Collect the glowing orbs and find the hidden treasure chest!" },
  ],
  level3: [
    { speaker: 'M', text: "Someone's been waiting for you." },
    { speaker: 'D', text: "Milo!" },
    { speaker: 'M', text: "Throw the ball and let Milo fetch it back. Do it 3 times!" },
  ],
  level4: [
    { speaker: 'M', text: "Ready for a swim, baby?" },
    { speaker: 'D', text: "You know I never say no to water." },
    { speaker: 'M', text: "Collect 6 golden rings! Watch out for jellyfish!" },
  ],
  level5: [
    { speaker: 'M', text: "One last journey, D." },
    { speaker: 'D', text: "Where are we going?" },
    { speaker: 'M', text: "Drive home! Stay on the road!" },
  ],
};

function startDialogue(key, callback) {
  const lines = DIALOGUES[key];
  if (!lines) { if (callback) callback(); return; }
  dialogueQueue = [...lines]; dialogueCallback = callback; dialogueActive = true; showNextDialogue();
}
function showNextDialogue() {
  if (dialogueQueue.length === 0) { document.getElementById('dialogueBox').style.display = 'none'; dialogueActive = false; if (dialogueCallback) dialogueCallback(); return; }
  const line = dialogueQueue.shift();
  document.getElementById('dialogueBox').style.display = 'block';
  document.getElementById('dialogueSpeaker').textContent = line.speaker;
  dialogueFullText = line.text; dialogueCharIndex = 0; dialogueTyping = true; dialogueTimer = 0;
  document.getElementById('dialogueText').textContent = '';
  document.getElementById('dialogueHint').textContent = '';
}
function updateDialogue(dt) {
  if (!dialogueActive) return;
  if (dialogueTyping) {
    dialogueTimer += dt;
    while (dialogueTimer > 0.025 && dialogueCharIndex < dialogueFullText.length) { dialogueCharIndex++; dialogueTimer -= 0.025; }
    document.getElementById('dialogueText').textContent = dialogueFullText.substring(0, dialogueCharIndex);
    if (dialogueCharIndex >= dialogueFullText.length) { dialogueTyping = false; document.getElementById('dialogueHint').textContent = 'ENTER to continue'; }
    if (enterKey()) { if (dialogueTyping) { dialogueCharIndex = dialogueFullText.length; document.getElementById('dialogueText').textContent = dialogueFullText; dialogueTyping = false; document.getElementById('dialogueHint').textContent = 'ENTER to continue'; } else showNextDialogue(); }
  } else { if (enterKey()) showNextDialogue(); }
}

// ---- THREE.JS SETUP ----
function initThree() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.2;
  document.body.prepend(renderer.domElement);
  clock = new THREE.Clock();
  addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
}

// ---- INPUT ----
addEventListener('keydown', e => { if (!keys[e.code]) keysJustPressed[e.code] = true; keys[e.code] = true; e.preventDefault(); });
addEventListener('keyup', e => { keys[e.code] = false; });
function justPressed(c) { if (keysJustPressed[c]) { keysJustPressed[c] = false; return true; } return false; }
function isDown(c) { return !!keys[c]; }
function moveX() { return (isDown('ArrowRight') || isDown('KeyD') ? 1 : 0) - (isDown('ArrowLeft') || isDown('KeyA') ? 1 : 0); }
function moveZ() { return (isDown('ArrowUp') || isDown('KeyW') ? 1 : 0) - (isDown('ArrowDown') || isDown('KeyS') ? 1 : 0); }
function jumpKey() { return justPressed('Space'); }
function enterKey() { return justPressed('Enter'); }

// ---- AUDIO ----
function ensureAudio() { if (!audioCtx) audioCtx = new (AudioContext || webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function stopMusic() { musicNodes.forEach(n => { try { n.stop(); } catch(e) {} }); musicNodes = []; musicPlaying = false; }
function makeNote(freq, type, vol, start, dur, dest) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, start);
  g.gain.setValueAtTime(vol, start); g.gain.linearRampToValueAtTime(0.001, start + dur);
  o.connect(g).connect(dest || audioCtx.destination); o.start(start); o.stop(start + dur + 0.02); musicNodes.push(o); return o;
}
function makeFilteredNote(freq, type, vol, start, dur, filterFreq) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain(), f = audioCtx.createBiquadFilter();
  o.type = type; o.frequency.setValueAtTime(freq, start);
  f.type = 'lowpass'; f.frequency.setValueAtTime(filterFreq || 800, start); f.Q.setValueAtTime(1, start);
  g.gain.setValueAtTime(vol, start); g.gain.linearRampToValueAtTime(0.001, start + dur);
  o.connect(f).connect(g).connect(audioCtx.destination); o.start(start); o.stop(start + dur + 0.02); musicNodes.push(o);
}
function playPiano() {
  ensureAudio(); stopMusic(); musicPlaying = true;
  // Mellow, gentle piano — C major / Am feel
  // C - Am - F - G - C - Em - F - G
  const chords = [
    [262, 330, 392],  // C
    [220, 262, 330],  // Am
    [175, 220, 262],  // F
    [196, 247, 294],  // G
    [262, 330, 392],  // C
    [165, 208, 247],  // Em
    [175, 220, 262],  // F
    [196, 247, 294],  // G
  ];
  // Gentle, flowing melody — soft and tender
  const melodies = [
    [523, 0, 494, 0, 440, 0, 494, 0],
    [440, 0, 392, 0, 330, 0, 392, 0],
    [349, 0, 392, 0, 440, 0, 392, 0],
    [392, 0, 440, 0, 494, 0, 440, 0],
    [523, 0, 587, 0, 523, 0, 494, 0],
    [330, 0, 392, 0, 440, 0, 392, 0],
    [349, 0, 330, 0, 294, 0, 330, 0],
    [392, 0, 349, 0, 330, 0, 294, 0],
  ];
  let beat = 0;
  const bpm = 72, beatMs = 60000 / bpm;
  const eighthMs = beatMs / 2;

  function tick() {
    if (!musicPlaying) return;
    const t = audioCtx.currentTime;
    const bar = Math.floor(beat / 8) % 8;
    const pos = beat % 8;
    const chord = chords[bar];
    const melNote = melodies[bar][pos];

    // === SOFT PIANO MELODY (very quiet) ===
    if (melNote) {
      makeNote(melNote, 'sine', 0.008, t, eighthMs / 1000 * 2.5);
      makeNote(melNote * 2, 'sine', 0.002, t + 0.02, eighthMs / 1000 * 1.5);
    }

    // === GENTLE CHORD PAD (every 4 beats, barely audible) ===
    if (pos === 0) {
      chord.forEach(f => {
        makeNote(f, 'sine', 0.004, t, beatMs / 1000 * 4);
        makeNote(f * 0.5, 'sine', 0.002, t, beatMs / 1000 * 4);
      });
    }

    // === SOFT ARPEGGIO (gentle rolling notes) ===
    if (pos % 2 === 0) {
      const ci = (pos / 2) % 3;
      makeNote(chord[ci] * 2, 'sine', 0.005, t, beatMs / 1000 * 1.5);
    }

    beat++;
    setTimeout(tick, eighthMs);
  }
  tick();
}

// ================================================================
//  CHARACTER BUILDER
// ================================================================
function createCharacter(opts = {}) {
  const group = new THREE.Group();
  const isFemale = opts.female || false;
  const isTintin = opts.tintin || false;
  const skinColor = isTintin ? 0xF5CBA7 : (opts.skinColor || 0x8D6E4C);
  const hairColor = isTintin ? 0xE8A839 : (opts.hairColor || 0x1a1a1a);
  const shirtColor = opts.shirtColor || 0xf0f0f0;

  const skinMat = new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.7, metalness: 0.05 });
  const skinMatDark = new THREE.MeshStandardMaterial({ color: (skinColor & 0xfefefe) - 0x0a0808, roughness: 0.7, metalness: 0.05 });
  const hairMat = new THREE.MeshStandardMaterial({ color: hairColor, roughness: 0.9, metalness: 0.1 });
  const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.3 });
  const eyeDarkMat = new THREE.MeshStandardMaterial({ color: 0x1a1008, roughness: 0.3 });
  const lipMat = new THREE.MeshStandardMaterial({ color: isFemale ? 0xCC6666 : 0x9B5E4A, roughness: 0.6 });
  const shirtMat = new THREE.MeshStandardMaterial({ color: shirtColor, roughness: 0.8 });
  const pantsMat = new THREE.MeshStandardMaterial({ color: opts.pantsColor || (isTintin ? 0xd4a060 : 0x3a3a4a), roughness: 0.8 });
  const shoeMat = new THREE.MeshStandardMaterial({ color: opts.shoeColor || 0x2a2a2a, roughness: 0.6 });

  const head = new THREE.Group();
  const skull = new THREE.Mesh(new THREE.SphereGeometry(0.28, 16, 16), skinMat);
  skull.scale.set(1, 1.1, 1); skull.position.y = 1.75; head.add(skull);

  if (isTintin) {
    // Tintin's iconic quiff
    const quiff = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.35, 6), hairMat);
    quiff.position.set(0, 2.05, 0.15); quiff.rotation.x = 0.4; quiff.rotation.z = 0.15; head.add(quiff);
    // Base hair
    const hairBase = new THREE.Mesh(new THREE.SphereGeometry(0.27, 12, 10, 0, Math.PI * 2, 0, Math.PI * 0.5), hairMat);
    hairBase.position.y = 1.80; hairBase.scale.set(1.05, 1, 1.05); head.add(hairBase);
  } else if (isFemale) {
    const hairTop = new THREE.Mesh(new THREE.SphereGeometry(0.30, 16, 12), hairMat);
    hairTop.position.y = 1.80; hairTop.scale.set(1.05, 1.05, 1.05); head.add(hairTop);
    const hairBack = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.15, 0.6, 8), hairMat);
    hairBack.position.set(0, 1.48, -0.1); head.add(hairBack);
    for (let s of [-1, 1]) { const sH = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.06, 0.4, 6), hairMat); sH.position.set(s * 0.24, 1.60, 0.05); head.add(sH); }
  } else {
    const hairTop = new THREE.Mesh(new THREE.SphereGeometry(0.29, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.55), hairMat);
    hairTop.position.y = 1.78; hairTop.scale.set(1.02, 1.05, 1.02); head.add(hairTop);
    for (let s of [-1, 1]) { const hS = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.18, 0.25), hairMat); hS.position.set(s * 0.26, 1.78, 0); head.add(hS); }
    const stubble = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 8, 0, Math.PI * 2, Math.PI * 0.55, Math.PI * 0.25),
      new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 1, transparent: true, opacity: 0.2 }));
    stubble.position.y = 1.68; stubble.position.z = 0.02; head.add(stubble);
  }

  // Eyes (Tintin gets bigger round eyes)
  const eyeSize = isTintin ? 0.055 : 0.045;
  for (let s of [-1, 1]) {
    const ew = new THREE.Mesh(new THREE.SphereGeometry(eyeSize, 10, 10), eyeWhiteMat);
    ew.position.set(s * 0.1, 1.78, 0.24); ew.scale.set(1, 0.7, 0.5); head.add(ew);
    const iris = new THREE.Mesh(new THREE.SphereGeometry(isTintin ? 0.02 : 0.025, 8, 8), eyeDarkMat);
    iris.position.set(s * 0.1, 1.775, 0.27); head.add(iris);
    if (!isTintin) { const brow = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.015, 0.03), hairMat); brow.position.set(s * 0.1, 1.83, 0.24); brow.rotation.z = s * -0.15; head.add(brow); }
  }
  const nose = new THREE.Mesh(new THREE.ConeGeometry(isTintin ? 0.025 : 0.035, 0.08, 6), skinMatDark);
  nose.position.set(0, 1.73, 0.28); nose.rotation.x = -0.3; head.add(nose);
  const lips = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.02, 0.03), lipMat);
  lips.position.set(0, 1.67, 0.25); head.add(lips);
  for (let s of [-1, 1]) { const ear = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), skinMat); ear.position.set(s * 0.28, 1.76, 0); ear.scale.set(0.5, 0.8, 0.6); head.add(ear); }
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.12, 8), skinMat);
  neck.position.y = 1.55; head.add(neck);
  if (opts.capColor) {
    const capMat = new THREE.MeshStandardMaterial({ color: opts.capColor, roughness: 0.7 });

    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), skinMat);
    hand.position.y = -0.58; hand.scale.set(0.9, 1.1, 0.7); arms[side].add(hand);
    arms[side].position.set(sv * 0.30, 1.42, 0); group.add(arms[side]);
  }
  group.userData.leftArm = arms.left; group.userData.rightArm = arms.right;

  const legs = { left: new THREE.Group(), right: new THREE.Group() };
  for (let [side, sv] of [['left', -1], ['right', 1]]) {

  }
  group.userData.leftLeg = legs.left; group.userData.rightLeg = legs.right;

  group.userData.velocity = new THREE.Vector3(); group.userData.grounded = true;
  group.userData.animTime = 0; group.userData.animState = 'idle';
  group.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  if (isFemale) group.scale.set(0.9, 0.9, 0.9);

function animateCharacter(ch, dt, sp = 0) {
  const ud = ch.userData; if (!ud.leftArm) return;
  ud.animTime += dt * (sp > 0.5 ? 8 : 4);
  const t = ud.animTime, la = ud.leftArm, ra = ud.rightArm, ll = ud.leftLeg, rl = ud.rightLeg;
  if (ud.animState === 'walk' || ud.animState === 'run') {
    const amp = ud.animState === 'run' ? 0.6 : 0.35;
    la.rotation.x = Math.sin(t) * amp; ra.rotation.x = -Math.sin(t) * amp;
    ll.rotation.x = -Math.sin(t) * amp; rl.rotation.x = Math.sin(t) * amp;
  } else if (ud.animState === 'idle') {
    la.rotation.x = Math.sin(t * 0.5) * 0.05; ra.rotation.x = -Math.sin(t * 0.5) * 0.05; ll.rotation.x = 0; rl.rotation.x = 0;
  } else if (ud.animState === 'jump') { la.rotation.x = -0.8; ra.rotation.x = -0.8; ll.rotation.x = 0.3; rl.rotation.x = 0.3; }
  else if (ud.animState === 'swim') { la.rotation.x = Math.sin(t * 1.5); ra.rotation.x = -Math.sin(t * 1.5); la.rotation.z = -0.5 + Math.sin(t * 1.5) * 0.3; ra.rotation.z = 0.5 - Math.sin(t * 1.5) * 0.3; ll.rotation.x = Math.sin(t * 2) * 0.5; rl.rotation.x = -Math.sin(t * 2) * 0.5; }
  else if (ud.animState === 'kick') { la.rotation.x = -0.3; ra.rotation.x = 0.3; rl.rotation.x = -1.2; ll.rotation.x = 0.1; }
  else if (ud.animState === 'throw') { ra.rotation.x = -1.5 + Math.sin(t * 6) * 0.5; la.rotation.x = 0.1; }
}

// ---- CAMERA & UTILS ----
const cameraTarget = new THREE.Vector3(), cameraOffset = new THREE.Vector3(0, 3, 6);
let cameraMode = 'follow';
function updateCamera(tgt, dt) {
  let dp;
  if (cameraMode === 'follow') dp = new THREE.Vector3(tgt.x + cameraOffset.x, tgt.y + cameraOffset.y, tgt.z + cameraOffset.z);
  else if (cameraMode === 'side') dp = new THREE.Vector3(tgt.x + 8, tgt.y + 3, tgt.z);
  else dp = new THREE.Vector3(tgt.x, tgt.y + cameraOffset.y, tgt.z + cameraOffset.z);
  camera.position.lerp(dp, dt * 3);
  cameraTarget.lerp(new THREE.Vector3(tgt.x, tgt.y + 1.5, tgt.z), dt * 5);
  camera.lookAt(cameraTarget);
}
function clearScene() { while (scene.children.length > 0) scene.remove(scene.children[0]); }
function addLights(ac = 0x404060, ai = 0.4, dc = 0xffffff, di = 0.8, dp = [5, 10, 5]) {
  scene.add(new THREE.AmbientLight(ac, ai));
  const d = new THREE.DirectionalLight(dc, di); d.position.set(...dp); d.castShadow = true;
  d.shadow.mapSize.width = 2048; d.shadow.mapSize.height = 2048;
  d.shadow.camera.near = 0.5; d.shadow.camera.far = 50;
  d.shadow.camera.left = -20; d.shadow.camera.right = 20; d.shadow.camera.top = 20; d.shadow.camera.bottom = -20;
  scene.add(d); return d;
}
function showLevelTitle(t) { const el = document.getElementById('levelTitle'); el.innerHTML = t; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 3000); }
function setHudInfo(t) { document.getElementById('info').innerHTML = t; }
function setControls(t) { document.getElementById('controls').textContent = t; }
function fadeIn(cb) { const el = document.getElementById('fade'); el.style.opacity = '1'; setTimeout(() => { if (cb) cb(); el.style.opacity = '0'; }, 800); }
function createGround(c, w, d) { const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), new THREE.MeshStandardMaterial({ color: c, roughness: 0.9 })); m.rotation.x = -Math.PI / 2; m.receiveShadow = true; scene.add(m); return m; }
function createBox(w, h, d, c, x, y, z) { const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: c, roughness: 0.7 })); m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true; scene.add(m); return m; }

function initLevel1() {
  clearScene(); scene.background = new THREE.Color(0x6699cc); scene.fog = new THREE.Fog(0x6699cc, 30, 80);
  addLights(0x507090, 0.5, 0xffeedd, 1.0, [10, 15, 5]);
  createGround(0x2d8a4e, 60, 40);
  const lm = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
  scene.add(mk(new THREE.Mesh(new THREE.PlaneGeometry(0.1, 40), lm), { rotation: new THREE.Euler(-Math.PI / 2, 0, 0), position: new THREE.Vector3(0, 0.01, 0) }));
  scene.add(mk(new THREE.Mesh(new THREE.RingGeometry(3.9, 4, 32), lm), { rotation: new THREE.Euler(-Math.PI / 2, 0, 0), position: new THREE.Vector3(0, 0.01, 0) }));
  for (let z of [-19.9, 19.9]) scene.add(mk(new THREE.Mesh(new THREE.PlaneGeometry(60, 0.1), lm), { rotation: new THREE.Euler(-Math.PI / 2, 0, 0), position: new THREE.Vector3(0, 0.01, z) }));
  for (let x of [-29.9, 29.9]) scene.add(mk(new THREE.Mesh(new THREE.PlaneGeometry(0.1, 40), lm), { rotation: new THREE.Euler(-Math.PI / 2, 0, 0), position: new THREE.Vector3(x, 0.01, 0) }));
  function makeGoal(x) {
    const pm = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.6, roughness: 0.3 });
    scene.add(mk(new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 3, 8), pm), { position: new THREE.Vector3(x, 1.5, -2.5) }));
    scene.add(mk(new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 3, 8), pm), { position: new THREE.Vector3(x, 1.5, 2.5) }));
    const tb = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 5, 8), pm); tb.rotation.x = Math.PI / 2; tb.position.set(x, 3, 0); scene.add(tb);
  }
  makeGoal(-28); makeGoal(28);

  const ball = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 }));
  ball.position.set(0, 0.3, 0); ball.castShadow = true; scene.add(ball);

  // Keeper
  const keeper = createCharacter(); keeper.position.set(26, 0, 0); keeper.userData.shirtMat.color.setHex(0xcc2222); scene.add(keeper);

  // Opponent striker who tries to score against you!
  const opponent = createCharacter(); opponent.position.set(5, 0, 0); opponent.userData.shirtMat.color.setHex(0x2255CC); scene.add(opponent);

  character = createCharacter({ shirtColor: 0xCC2233, pantsColor: 0xffffff, shoeColor: 0x1a1a1a }); character.position.set(-15, 0, 0); scene.add(character);

  // Hidden heart - tucked in corner of field
  const hiddenHeart = createHiddenHeart(-27, 1.2, -18);

  cameraMode = 'follow'; cameraOffset.set(0, 5, 10);
  levelData = {
    ball, keeper, opponent, goals: 0, oppGoals: 0, maxGoals: 3,
    ballVel: new THREE.Vector3(), ballKicked: false, kickCooldown: 0,
    oppState: 'chase', oppKickCd: 0, oppThinkTimer: 0,
    started: false, hiddenHeart
  };
  showLevelTitle('Level 1<br>The Football Match'); playPiano(); updateHeartHud();
  startDialogue('level1', () => { levelData.started = true; setControls('WASD/Arrows: Move | SPACE: Kick | Score before they do!'); });
}

function updateLevel1(dt) {
  const ld = levelData;
  if (dialogueActive) { updateDialogue(dt); animateCharacter(character, dt, 0); updateCamera(character.position, dt); return; }
  if (!ld.started) return;
  const speed = 8, mx = moveX(), mz = moveZ();

  // Player movement
  if (mx !== 0 || mz !== 0) { character.position.x += mx * speed * dt; character.position.z -= mz * speed * dt; character.rotation.y = Math.atan2(mx, -mz); character.userData.animState = 'run'; }
  else character.userData.animState = 'idle';
  animateCharacter(character, dt, Math.abs(mx) + Math.abs(mz));
  character.position.x = THREE.MathUtils.clamp(character.position.x, -29, 29);
  character.position.z = THREE.MathUtils.clamp(character.position.z, -19, 19);

  // Ball dribble
  const dBall = character.position.distanceTo(ld.ball.position);
  if (dBall < 1.2 && !ld.ballKicked) {
    const dir = new THREE.Vector3(Math.sin(character.rotation.y), 0, -Math.cos(character.rotation.y));
    ld.ball.position.copy(character.position).add(dir.multiplyScalar(0.8)); ld.ball.position.y = 0.3;
  }
  // Player kick
  ld.kickCooldown -= dt;
  if (jumpKey() && dBall < 1.5 && ld.kickCooldown <= 0) {
    const dir = new THREE.Vector3(Math.sin(character.rotation.y), 0.2, -Math.cos(character.rotation.y));
    ld.ballVel.copy(dir.multiplyScalar(20)); ld.ballKicked = true; ld.kickCooldown = 0.5;
    character.userData.animState = 'kick';
  }

  // OPPONENT AI
  const opp = ld.opponent;
  ld.oppKickCd -= dt;
  const oppDist = opp.position.distanceTo(ld.ball.position);
  // Chase ball
  const bx = ld.ball.position.x - opp.position.x, bz = ld.ball.position.z - opp.position.z;
  const bDist = Math.sqrt(bx * bx + bz * bz);
  if (bDist > 1.0) {
    const oppSpeed = 5.5;
    opp.position.x += (bx / bDist) * oppSpeed * dt;
    opp.position.z += (bz / bDist) * oppSpeed * dt;
    opp.rotation.y = Math.atan2(bx, bz);
    opp.userData.animState = 'run';
  } else {
    opp.userData.animState = 'idle';
  }
  animateCharacter(opp, dt, 1);
  opp.position.x = THREE.MathUtils.clamp(opp.position.x, -29, 29);
  opp.position.z = THREE.MathUtils.clamp(opp.position.z, -19, 19);

  // Opponent dribble & kick toward player's goal
  if (oppDist < 1.2 && !ld.ballKicked && ld.oppKickCd <= 0) {
    // Dribble toward player's goal (-28, 0)
    const toGoal = new THREE.Vector3(-28 - opp.position.x, 0, -opp.position.z).normalize();
    ld.ball.position.copy(opp.position).add(toGoal.clone().multiplyScalar(0.8));
    ld.ball.position.y = 0.3;

    // Kick when close to goal
    if (opp.position.x < -15) {
      ld.ballVel.copy(toGoal.multiplyScalar(16 + Math.random() * 5));
      ld.ballVel.y = 0.3;
      ld.ballKicked = true;
      ld.oppKickCd = 2;
      opp.userData.animState = 'kick';

    }
  }

  // Ball physics
  if (ld.ballKicked) {
    ld.ball.position.add(ld.ballVel.clone().multiplyScalar(dt));
    ld.ballVel.multiplyScalar(0.97); ld.ballVel.y -= 9.8 * dt;
    if (ld.ball.position.y < 0.3) { ld.ball.position.y = 0.3; ld.ballVel.y = 0; ld.ballVel.multiplyScalar(0.95); }
    ld.ball.rotation.x += ld.ballVel.length() * dt * 2;
    if (ld.ballVel.length() < 0.3) ld.ballKicked = false;

    // Player scores
    if (ld.ball.position.x > 27 && Math.abs(ld.ball.position.z) < 2.5 && ld.ball.position.y < 3) {
      ld.goals++; ld.ball.position.set(0, 0.3, 0); ld.ballVel.set(0, 0, 0); ld.ballKicked = false;
      character.position.set(-5, 0, 0); opp.position.set(5, 0, 0);
      if (ld.goals >= ld.maxGoals) { showLevelTitle('You always score in life.'); setTimeout(() => nextLevel(), 2500); return; }
    }
    // Opponent scores against player
    if (ld.ball.position.x < -27 && Math.abs(ld.ball.position.z) < 2.5 && ld.ball.position.y < 3) {
      ld.oppGoals++; ld.ball.position.set(0, 0.3, 0); ld.ballVel.set(0, 0, 0); ld.ballKicked = false;
      character.position.set(-5, 0, 0); opp.position.set(5, 0, 0);
    }

    if (Math.abs(ld.ball.position.x) > 32 || Math.abs(ld.ball.position.z) > 22) { ld.ball.position.set(0, 0.3, 0); ld.ballVel.set(0, 0, 0); ld.ballKicked = false; }
  }

  // Keeper AI
  const kp = ld.keeper; kp.userData.animState = 'walk'; animateCharacter(kp, dt, 1);
  kp.position.z += (ld.ball.position.z * 0.7 - kp.position.z) * dt * 3;
  kp.position.z = THREE.MathUtils.clamp(kp.position.z, -3, 3); kp.rotation.y = Math.PI;
  if (ld.ballKicked && ld.ball.position.x > 25 && Math.abs(ld.ball.position.z - kp.position.z) < 1.5) { ld.ballVel.x = -Math.abs(ld.ballVel.x) * 0.5; ld.ballVel.z += (Math.random() - 0.5) * 5; }

  // Heart
  updateHiddenHeart(ld.hiddenHeart, dt);
  checkHeartCollect(ld.hiddenHeart, character.position, 0);

  setHudInfo(`D ${ld.goals} - ${ld.oppGoals} Opponent`);
  updateCamera(character.position, dt);
}

function updateLevel3(dt) {
  const ld = levelData;
  if (dialogueActive) { updateDialogue(dt); animateCharacter(character, dt, 0); updateCamera(character.position, dt); return; }
  if (!ld.started) return;
  const speed = 5, mx = moveX(), mz = moveZ();
  if (mx !== 0 || mz !== 0) { character.position.x += mx * speed * dt; character.position.z -= mz * speed * dt; character.rotation.y = Math.atan2(mx, -mz); character.userData.animState = 'walk'; }
  else character.userData.animState = ld.hasBall ? 'throw' : 'idle';
  animateCharacter(character, dt, Math.abs(mx) + Math.abs(mz));
  character.position.x = THREE.MathUtils.clamp(character.position.x, -25, 25);
  character.position.z = THREE.MathUtils.clamp(character.position.z, -25, 25);

  ld.throwCooldown -= dt;
  if (jumpKey() && ld.hasBall && ld.throwCooldown <= 0) {
    const dir = new THREE.Vector3(Math.sin(character.rotation.y), 0.4, -Math.cos(character.rotation.y));
    ld.ballVel.copy(dir.multiplyScalar(12)); ld.tennisBall.position.copy(character.position); ld.tennisBall.position.y = 1.2;
    ld.ballThrown = true; ld.hasBall = false; ld.throwCooldown = 0.5;
  }
  if (ld.ballThrown) {
    ld.tennisBall.position.add(ld.ballVel.clone().multiplyScalar(dt)); ld.ballVel.y -= 9.8 * dt; ld.tennisBall.rotation.x += 5 * dt;
    if (ld.tennisBall.position.y <= 0.15) { ld.tennisBall.position.y = 0.15; ld.ballVel.set(0, 0, 0); ld.ballThrown = false; ld.miloState = 'chasing'; ld.miloTarget.copy(ld.tennisBall.position); }
  }

  const milo = ld.milo;
  if (ld.miloState === 'idle') {
    if (milo.userData.tail) milo.userData.tail.rotation.x = Math.sin(Date.now() * 0.01) * 0.5;
    const dx = character.position.x - milo.position.x, dz = character.position.z - milo.position.z;
    milo.rotation.y = Math.atan2(dx, dz);
  } else if (ld.miloState === 'chasing') {
    const dx = ld.miloTarget.x - milo.position.x, dz = ld.miloTarget.z - milo.position.z, dist = Math.sqrt(dx * dx + dz * dz);
    if (dist > 0.5) { milo.position.x += (dx / dist) * 8 * dt; milo.position.z += (dz / dist) * 8 * dt; milo.rotation.y = Math.atan2(dx, dz); milo.position.y = Math.abs(Math.sin(Date.now() * 0.015)) * 0.15; }
    else { ld.miloState = 'returning'; ld.tennisBall.visible = false; }
    if (milo.userData.tail) milo.userData.tail.rotation.x = Math.sin(Date.now() * 0.02) * 0.8;
  } else if (ld.miloState === 'returning') {
    const dx = character.position.x - milo.position.x, dz = character.position.z - milo.position.z, dist = Math.sqrt(dx * dx + dz * dz);
    if (dist > 1.5) { milo.position.x += (dx / dist) * 7 * dt; milo.position.z += (dz / dist) * 7 * dt; milo.rotation.y = Math.atan2(dx, dz); milo.position.y = Math.abs(Math.sin(Date.now() * 0.015)) * 0.15; }
    else { ld.fetchCount++; ld.hasBall = true; ld.tennisBall.visible = true; ld.tennisBall.position.copy(character.position); ld.tennisBall.position.y = 0.15; ld.miloState = 'idle';
      if (ld.fetchCount >= ld.maxFetches) { showLevelTitle('Best adventures are shared.'); setTimeout(() => nextLevel(), 2500); }
    }
    if (milo.userData.tail) milo.userData.tail.rotation.x = Math.sin(Date.now() * 0.02) * 1.0;
  }

  updateHiddenHeart(ld.hiddenHeart, dt);
  checkHeartCollect(ld.hiddenHeart, character.position, 2);

  setHudInfo(`Fetch: ${ld.fetchCount} / ${ld.maxFetches}`);
  updateCamera(character.position, dt);
}

  car.position.set(0, 0, 5); car.traverse(c => { if (c.isMesh) c.castShadow = true; }); scene.add(car);

  const obstacles = [];
  for (let i = 0; i < 6; i++) { const obs = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.2, 3), new THREE.MeshStandardMaterial({ color: [0x883333, 0x338833, 0x333388, 0x888833][i % 4], metalness: 0.4 })); obs.add(new THREE.PointLight(0xffffcc, 0.3, 8)); obs.position.set((Math.random() - 0.5) * 4, 0.7, -30 - i * 25); scene.add(obs); obstacles.push(obs); }

  const home = new THREE.Group();
  home.add(mk(new THREE.Mesh(new THREE.BoxGeometry(6, 4, 5), new THREE.MeshStandardMaterial({ color: 0xD4956A })), { position: new THREE.Vector3(0, 2, 0) }));
  const roof = new THREE.Mesh(new THREE.ConeGeometry(5, 2, 4), new THREE.MeshStandardMaterial({ color: 0x8B4513 })); roof.rotation.y = Math.PI / 4; roof.position.y = 5; home.add(roof);
  home.add(mk(new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2.5), new THREE.MeshStandardMaterial({ color: 0x654321, side: THREE.DoubleSide })), { position: new THREE.Vector3(0, 1.25, 2.51) }));

  // Hidden heart by a roadside tree at ~halfway
  const hiddenHeart = createHiddenHeart(0, 1, -95);

  character = car; cameraMode = 'behind'; cameraOffset.set(0, 3, 8);
  levelData = { car, obstacles, speed: 12, maxSpeed: 20, reachedHome: false, distance: 0, totalDistance: 195, started: false, hiddenHeart, carPos: car.position };
  showLevelTitle('Level 5<br>The Drive'); playPiano(); updateHeartHud();
  startDialogue('level5', () => { levelData.started = true; setControls('Left/Right or A/D: Steer | Up/W: Accelerate'); });
}

function updateLevel5(dt) {
  const ld = levelData;
  if (dialogueActive) { updateDialogue(dt); updateCamera(ld.car.position, dt); return; }
  if (!ld.started) return;
  const mx = moveX(), acc = isDown('ArrowUp') || isDown('KeyW');
  ld.car.position.x += mx * 5 * dt; ld.car.position.x = THREE.MathUtils.clamp(ld.car.position.x, -3.5, 3.5);
  const cs = acc ? ld.maxSpeed : ld.speed;
  ld.car.position.z -= cs * dt; ld.distance += cs * dt;
  ld.car.rotation.z = -mx * 0.05; ld.car.rotation.y = mx * 0.03;


  ld.obstacles.forEach(obs => { obs.position.z += 15 * dt;
    if (obs.position.z > ld.car.position.z + 20) { obs.position.z = ld.car.position.z - 60 - Math.random() * 30; obs.position.x = (Math.random() - 0.5) * 5; }
    if (Math.abs(obs.position.z - ld.car.position.z) < 2.5 && Math.abs(obs.position.x - ld.car.position.x) < 1.8) { ld.car.position.x += (ld.car.position.x - obs.position.x) * 2 * dt; }
  });

  // Heart check (use car position)
  updateHiddenHeart(ld.hiddenHeart, dt);
  checkHeartCollect(ld.hiddenHeart, ld.car.position, 4);

  if (!ld.reachedHome && ld.distance >= ld.totalDistance) { ld.reachedHome = true; showLevelTitle('Almost home.'); setTimeout(() => showEnding(), 2500); }
  setHudInfo(`Distance: ${Math.min(ld.distance / ld.totalDistance * 100, 100).toFixed(0)}%`);
  updateCamera(ld.car.position, dt);
}

function updateTitleScene(dt) {
  if (!character) return;
  // D walks forward slowly
  character.userData.animState = 'walk'; animateCharacter(character, dt, 0.5);
  levelData.walkZ -= dt * 1.5; character.position.z = levelData.walkZ % 30;

  camera.position.set(1.5 + Math.sin(Date.now() * 0.0003) * 0.3, 2.2, character.position.z + 5);

  if (levelData.particles) { levelData.particles.position.z = character.position.z; levelData.particles.rotation.y += dt * 0.02; }

function spawnHearts() {

    h.style.fontSize = (14 + Math.random() * 18) + 'px';
    h.style.animation = `floatHeart ${4 + Math.random() * 4}s ease-out forwards`;
    h.style.opacity = 0.3 + Math.random() * 0.5;
    c.appendChild(h); setTimeout(() => h.remove(), 8000);
    setTimeout(add, 500 + Math.random() * 1500);
  } add();
}

// ================================================================
//  GAME FLOW
// ================================================================
function startGame() { ensureAudio(); document.getElementById('titleScreen').style.display = 'none'; fadeIn(() => { gameState = 'PLAYING'; currentLevel = 0; loadLevel(0); }); }
function loadLevel(lv) { stopMusic(); setHudInfo(''); setControls(''); document.getElementById('dialogueBox').style.display = 'none'; dialogueActive = false; document.getElementById('skipBtn').style.display = 'block'; [initLevel1, initLevel2, initLevel3, initLevel4, initLevel5][lv](); }
function nextLevel() { document.getElementById('skipBtn').style.display = 'none'; currentLevel++; if (currentLevel >= 5) showEnding(); else fadeIn(() => loadLevel(currentLevel)); }
function skipLevel() { dialogueActive = false; document.getElementById('dialogueBox').style.display = 'none'; nextLevel(); }

function gameLoop() {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (gameState === 'TITLE') updateTitleScene(dt);
  else if (gameState === 'PLAYING') [updateLevel1, updateLevel2, updateLevel3, updateLevel4, updateLevel5][currentLevel](dt);
  renderer.render(scene, camera);
  Object.keys(keysJustPressed).forEach(k => { keysJustPressed[k] = false; });
}

initThree(); initTitleScene(); gameState = 'TITLE'; gameLoop();
